<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ArcticTrail Email Signature</title>
  <style>
    body {
      margin: 40px;
      background: #f3f4f6;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    .preview-label {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 16px;
      font-style: italic;
    }
  </style>
</head>
<body>

  <p class="preview-label">— Signature preview (copy everything inside the box below) —</p>

  <!-- ============================================================
       EMAIL SIGNATURE — copy from here
  ============================================================ -->
  <table role="presentation" cellpadding="0" cellspacing="0" border="0"
         style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; max-width: 480px;">

    <!-- Top divider with aurora gradient -->
    <tr>
      <td style="padding: 0 0 20px 0;">
        <div style="height: 3px; background: linear-gradient(90deg, #051a2a 0%, #0f3a5c 40%, #2dd4bf 100%); border-radius: 2px;"></div>
      </td>
    </tr>

    <!-- Name & role row -->
    <tr>
      <td style="padding: 0 0 4px 0;">
        <span style="font-size: 16px; font-weight: 700; color: #111827; letter-spacing: -0.01em;">Jørgen</span>
        <span style="font-size: 13px; color: #6b7280; padding-left: 8px;">· ArcticTrail</span>
      </td>
    </tr>

    <!-- Tagline -->
    <tr>
      <td style="padding: 0 0 16px 0;">
        <span style="font-size: 12px; color: #2dd4bf; font-style: italic; letter-spacing: 0.01em;">
          Your gateway to unforgettable Northern Lights adventures
        </span>
      </td>
    </tr>

    <!-- Contact details -->
    <tr>
      <td style="padding: 0 0 14px 0;">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0">

          <!-- Phone -->
          <tr>
            <td style="padding: 2px 10px 2px 0; vertical-align: middle;">
              <span style="display: inline-block; width: 14px; height: 14px; vertical-align: middle;">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2dd4bf" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.15 9.81a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.07 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21 16l.92.92z"/></svg>
              </span>
            </td>
            <td style="padding: 2px 0;">
              <a href="tel:+4740031175" style="font-size: 13px; color: #374151; text-decoration: none;">+47 400 31 175</a>
            </td>
          </tr>

          <!-- Email -->
          <tr>
            <td style="padding: 2px 10px 2px 0; vertical-align: middle;">
              <span style="display: inline-block; width: 14px; height: 14px; vertical-align: middle;">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2dd4bf" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              </span>
            </td>
            <td style="padding: 2px 0;">
              <a href="mailto:booking@arctictrail.no" style="font-size: 13px; color: #374151; text-decoration: none;">booking@arctictrail.no</a>
            </td>
          </tr>

          <!-- Website -->
          <tr>
            <td style="padding: 2px 10px 2px 0; vertical-align: middle;">
              <span style="display: inline-block; width: 14px; height: 14px; vertical-align: middle;">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2dd4bf" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
              </span>
            </td>
            <td style="padding: 2px 0;">
              <a href="https://arctictrail.no" style="font-size: 13px; color: #374151; text-decoration: none;">arctictrail.no</a>
            </td>
          </tr>

          <!-- Location -->
          <tr>
            <td style="padding: 2px 10px 2px 0; vertical-align: middle;">
              <span style="display: inline-block; width: 14px; height: 14px; vertical-align: middle;">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2dd4bf" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
              </span>
            </td>
            <td style="padding: 2px 0;">
              <span style="font-size: 13px; color: #374151;">Tromsø, Norway</span>
            </td>
          </tr>

        </table>
      </td>
    </tr>

    <!-- Bottom dark badge -->
    <tr>
      <td>
        <table role="presentation" cellpadding="0" cellspacing="0" border="0"
               style="background: linear-gradient(135deg, #051a2a 0%, #0f3a5c 100%); border-radius: 6px; padding: 10px 16px;">
          <tr>
            <td style="vertical-align: middle; padding-right: 10px;">
              <!-- Snowflake / Arctic icon as teal dot accent -->
              <div style="width: 8px; height: 8px; background: #2dd4bf; border-radius: 50%;"></div>
            </td>
            <td style="vertical-align: middle;">
              <span style="font-size: 11px; color: #94a3b8; letter-spacing: 0.05em; text-transform: uppercase;">ArcticTrail · Tromsø</span>
              <span style="font-size: 11px; color: #475569; padding-left: 8px;">· Open daily 08:00–20:00</span>
            </td>
          </tr>
        </table>
      </td>
    </tr>

  </table>
  <!-- ============================================================
       End of signature
  ============================================================ -->

</body>
</html>
